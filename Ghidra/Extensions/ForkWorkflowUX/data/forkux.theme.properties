# MalloyRE fork — scoped Workflow-UX colors (Phase 5A).
#
# These are NEW, fork-owned color ids used ONLY by ForkWorkflowUX components
# (the Entropy Findings view). They do not override any stock Ghidra color id,
# so the stock tool appearance is unchanged. Values are drawn from the MalloyRE
# design system's entropy heat scale and signal accent.
[Defaults]
color.fork.ux.entropy.0 = #1F3A6B
color.fork.ux.entropy.1 = #2E7C8C
color.fork.ux.entropy.2 = #4FBF8B
color.fork.ux.entropy.3 = #F5C26B
color.fork.ux.entropy.4 = #F59E33
color.fork.ux.entropy.5 = #F0616D
color.fork.ux.signal = #F59E33
color.fork.ux.fg.on-heat-dark = #0B0E15
color.fork.ux.fg.on-heat-light = #E7EBF4
color.fork.ux.fg.muted = #788299
